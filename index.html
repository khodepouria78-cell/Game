<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Duel of the Spheres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- کتابخانه‌های مورد نیاز برای بازی آنلاین -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a1620;
    --bg-mid: #122838;
    --bg-light: #1c3a52;
    --gold: #e8b65a;
    --gold-bright: #f4d27a;
    --gold-pale: #fff5d6;
    --gold-deep: #a87a30;
    --jade: #3dd68c;
    --jade-bright: #6ff0b0;
    --jade-deep: #1a8a55;
    --coral: #ff6b6b;
    --coral-bright: #ff9a8b;
    --cream: #f5e6d3;
    --muted: #8ba3b8;
    --border: rgba(232, 182, 90, 0.22);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--cream);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* ====== Cosmic background ====== */
  .cosmos-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(61, 214, 140, 0.08), transparent 50%),
      radial-gradient(ellipse at 85% 80%, rgba(232, 182, 90, 0.1), transparent 50%),
      radial-gradient(ellipse at center, rgba(28, 58, 82, 0.55), transparent 70%),
      linear-gradient(180deg, #0a1620 0%, #050d15 100%);
  }
  .aurora {
    position: fixed;
    inset: -30%;
    z-index: -2;
    background:
      radial-gradient(circle at 25% 30%, rgba(61, 214, 140, 0.18), transparent 35%),
      radial-gradient(circle at 75% 70%, rgba(232, 182, 90, 0.16), transparent 35%),
      radial-gradient(circle at 50% 50%, rgba(255, 107, 107, 0.06), transparent 45%);
    filter: blur(70px);
    animation: auroraDrift 35s ease-in-out infinite;
  }
  @keyframes auroraDrift {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    33% { transform: translate(4%, -3%) rotate(120deg); }
    66% { transform: translate(-3%, 4%) rotate(240deg); }
  }
  #starfield {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
  }

  /* ====== Main layout ====== */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 32px 24px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    gap: 20px;
  }

  /* ====== Header ====== */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .app-header::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand-seal {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    animation: sealRotate 60s linear infinite;
  }
  @keyframes sealRotate {
    to { transform: rotate(360deg); }
  }
  .brand-text h1 {
    font-family: 'Cinzel', serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.18em;
    background: linear-gradient(135deg, var(--gold-pale), var(--gold) 50%, var(--gold-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .brand-text p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat {
    background: rgba(18, 40, 56, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 10px;
    min-width: 84px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(232,182,90,0.08), transparent);
    pointer-events: none;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-bright);
    line-height: 1;
    transition: color 0.3s;
  }
  .stat.sol-stat .stat-value { color: var(--gold-bright); }
  .stat.luna-stat .stat-value { color: var(--jade-bright); }
  .stat.draw-stat .stat-value { color: var(--cream); }

  /* ====== Buttons ====== */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    background: rgba(18, 40, 56, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 11px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,182,90,0.15), transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(232, 182, 90, 0.18);
  }
  .btn:hover::before { opacity: 1; }
  .btn.active {
    background: linear-gradient(135deg, var(--gold-deep), var(--gold));
    color: var(--bg-deep);
    border-color: var(--gold-bright);
    box-shadow: 0 6px 20px rgba(232,182,90,0.3);
  }
  .btn.active.jade-active {
    background: linear-gradient(135deg, var(--jade-deep), var(--jade));
    border-color: var(--jade-bright);
    box-shadow: 0 6px 20px rgba(61,214,140,0.3);
  }
  .btn svg { display: block; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-deep), var(--gold));
    color: var(--bg-deep);
    border-color: var(--gold-bright);
    font-weight: 700;
    padding: 14px 28px;
    font-size: 13px;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-bright));
    box-shadow: 0 12px 35px rgba(232,182,90,0.4);
  }

  /* ====== Turn indicator ====== */
  .turn-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 4px 0;
  }
  .player-pill {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: rgba(18, 40, 56, 0.45);
    backdrop-filter: blur(10px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0.45;
    min-width: 160px;
  }
  .player-pill .pill-sigil {
    font-size: 32px;
    line-height: 1;
    transition: all 0.4s;
  }
  .player-pill .pill-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.25em;
  }
  .player-pill .pill-score {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    margin-left: auto;
  }
  .sol-pill .pill-sigil { color: var(--gold); }
  .sol-pill .pill-score { color: var(--gold-bright); }
  .luna-pill .pill-sigil { color: var(--jade); }
  .luna-pill .pill-score { color: var(--jade-bright); }

  .player-pill.active {
    opacity: 1;
    transform: translateY(-3px) scale(1.04);
  }
  .sol-pill.active {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(232,182,90,0.18), rgba(18,40,56,0.45));
    box-shadow: 0 8px 30px rgba(232, 182, 90, 0.3), 0 0 50px rgba(232,182,90,0.15);
  }
  .sol-pill.active .pill-sigil {
    color: var(--gold-pale);
    text-shadow: 0 0 18px rgba(244, 210, 122, 0.8);
    animation: sigilPulseGold 2.2s ease-in-out infinite;
  }
  .luna-pill.active {
    border-color: var(--jade);
    background: linear-gradient(135deg, rgba(61,214,140,0.18), rgba(18,40,56,0.45));
    box-shadow: 0 8px 30px rgba(61, 214, 140, 0.3), 0 0 50px rgba(61,214,140,0.15);
  }
  .luna-pill.active .pill-sigil {
    color: var(--jade-bright);
    text-shadow: 0 0 18px rgba(111, 240, 176, 0.8);
    animation: sigilPulseJade 2.2s ease-in-out infinite;
  }
  @keyframes sigilPulseGold {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.3); }
  }
  @keyframes sigilPulseJade {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.3); }
  }

  .turn-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 140px;
  }
  .turn-divider .vs-mark {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--muted);
  }
  .turn-divider .turn-text {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    transition: color 0.4s;
  }
  .turn-divider .turn-text.luna-turn { color: var(--jade-bright); }

  /* ====== Board ====== */
  .board-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
    min-height: 0;
    flex-direction: column;
    gap: 18px;
  }
  .board {
    display: grid;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    position: relative;
  }

  .cell {
    aspect-ratio: 1;
    cursor: pointer;
    position: relative;
    background:
      radial-gradient(circle at center, rgba(232,182,90,0.06) 0%, transparent 65%),
      linear-gradient(135deg, #1a3447 0%, #0a1c28 100%);
    border: 1.5px solid rgba(232, 182, 90, 0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  }
  .cell::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(232,182,90,0.13);
    border-radius: 8px;
    pointer-events: none;
    transition: border-color 0.3s;
  }
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(232,182,90,0.15), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .cell:not(.placed):not(.locked):hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.4), 0 0 22px rgba(232,182,90,0.18);
  }
  .cell:not(.placed):not(.locked):hover::before {
    border-color: rgba(232,182,90,0.3);
  }
  .cell:not(.placed):not(.locked):hover::after { opacity: 1; }

  .cell.locked { cursor: not-allowed; }

  .cell .symbol {
    font-size: clamp(28px, 8vw, 56px);
    line-height: 1;
    opacity: 0;
    transform: scale(0.3) rotate(-90deg);
    transition: opacity 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
  }
  [data-size="5"] .cell .symbol { font-size: clamp(22px, 5.5vw, 42px); }
  [data-size="7"] .cell .symbol { font-size: clamp(16px, 4vw, 32px); }

  .cell.sol .symbol {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    color: var(--gold-pale);
    text-shadow:
      0 0 18px rgba(244, 210, 122, 0.9),
      0 0 36px rgba(232, 182, 90, 0.55);
  }
  .cell.luna .symbol {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    color: var(--jade-bright);
    text-shadow:
      0 0 18px rgba(111, 240, 176, 0.9),
      0 0 36px rgba(61, 214, 140, 0.55);
  }
  .cell.preview-sol .symbol {
    opacity: 0.22;
    transform: scale(0.9) rotate(0deg);
    color: var(--gold-pale);
  }
  .cell.preview-luna .symbol {
    opacity: 0.22;
    transform: scale(0.9) rotate(0deg);
    color: var(--jade-bright);
  }

  /* Winning cells pulse */
  @keyframes winPulseGold {
    0%, 100% {
      box-shadow: 0 0 30px rgba(244, 210, 122, 0.5), inset 0 0 30px rgba(244,210,122,0.25);
      border-color: var(--gold-bright);
    }
    50% {
      box-shadow: 0 0 60px rgba(244, 210, 122, 0.95), inset 0 0 50px rgba(244,210,122,0.5);
      border-color: var(--gold-pale);
    }
  }
  @keyframes winPulseJade {
    0%, 100% {
      box-shadow: 0 0 30px rgba(111, 240, 176, 0.5), inset 0 0 30px rgba(111,240,176,0.25);
      border-color: var(--jade-bright);
    }
    50% {
      box-shadow: 0 0 60px rgba(111, 240, 176, 0.95), inset 0 0 50px rgba(111,240,176,0.5);
      border-color: #b8f5d4;
    }
  }
  .cell.winning.sol { animation: winPulseGold 1.6s ease-in-out infinite; }
  .cell.winning.luna { animation: winPulseJade 1.6s ease-in-out infinite; }

  /* Cell entrance */
  @keyframes cellDeal {
    0% {
      opacity: 0;
      transform: translateY(20px) scale(0.7);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  .cell.dealing {
    animation: cellDeal 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }

  /* Win line overlay */
  .win-line-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    width: 100%;
    height: 100%;
  }
  .win-line {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawLine 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* ====== Difficulty bar ====== */
  .difficulty-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    padding: 18px 0 6px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    position: relative;
  }
  .difficulty-bar::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }
  .difficulty-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-right: 6px;
  }

  /* ====== Modal ====== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 13, 21, 0.88);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    padding: 20px;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background:
      radial-gradient(circle at top, rgba(232,182,90,0.12), transparent 65%),
      linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
    border: 1px solid var(--gold);
    border-radius: 24px;
    padding: 48px 48px 40px;
    text-align: center;
    max-width: 480px;
    width: 100%;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 100px rgba(232, 182, 90, 0.2);
    transform: scale(0.85) translateY(30px);
    transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .modal.luna-win {
    border-color: var(--jade);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 100px rgba(61, 214, 140, 0.22);
    background:
      radial-gradient(circle at top, rgba(61,214,140,0.12), transparent 65%),
      linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
  }
  .modal.draw-modal {
    border-color: rgba(245, 230, 211, 0.5);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 100px rgba(245, 230, 211, 0.15);
  }
  .modal::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,182,90,0.05), transparent 50%);
    pointer-events: none;
  }
  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }
  .modal-rune {
    width: 64px;
    height: 64px;
    margin: 0 auto 12px;
    opacity: 0.9;
  }
  .modal h2 {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--gold-pale), var(--gold) 60%, var(--gold-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .modal.luna-win h2 {
    background: linear-gradient(135deg, #b8f5d4, var(--jade-bright) 60%, var(--jade-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal.draw-modal h2 {
    background: linear-gradient(135deg, var(--cream), var(--gold-pale) 60%, var(--muted));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal-subtitle {
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 11px;
  }

  .stars {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 28px 0;
    min-height: 70px;
    align-items: center;
  }
  .star {
    width: 64px;
    height: 64px;
    opacity: 0.25;
    transform: scale(0.7) rotate(-15deg);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 0 transparent);
  }
  .star.lit {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    filter: drop-shadow(0 0 18px rgba(244, 210, 122, 0.8));
    animation: starGlow 2s ease-in-out infinite;
  }
  .star.lit.jade {
    filter: drop-shadow(0 0 18px rgba(111, 240, 176, 0.8));
    animation: starGlowJade 2s ease-in-out infinite;
  }
  @keyframes starGlow {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(244, 210, 122, 0.8)); }
    50% { filter: drop-shadow(0 0 28px rgba(244, 210, 122, 1)); }
  }
  @keyframes starGlowJade {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(111, 240, 176, 0.8)); }
    50% { filter: drop-shadow(0 0 28px rgba(111, 240, 176, 1)); }
  }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 24px 0 28px;
    padding: 18px 12px;
    background: rgba(10, 22, 32, 0.6);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .modal-stat-value {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold-bright);
    line-height: 1;
    margin-bottom: 6px;
  }
  .modal-stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ====== Net Modal (Online Setup) ====== */
  .net-modal { max-width: 420px; text-align: center; }
  .net-screen { display: none; flex-direction: column; align-items: center; gap: 18px; }
  .net-screen.active { display: flex; }
  .net-info-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    line-height: 1.6;
  }
  .net-loader {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(232, 182, 90, 0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 10px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ====== Floating particles ====== */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    z-index: 50;
  }

  /* ====== Confetti ====== */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* ====== Music indicator pulse ====== */
  .music-wave {
    display: inline-flex;
    gap: 2px;
    align-items: flex-end;
    height: 12px;
  }
  .music-wave span {
    width: 2px;
    background: currentColor;
    border-radius: 1px;
    animation: wave 0.9s ease-in-out infinite;
  }
  .music-wave span:nth-child(1) { height: 60%; animation-delay: 0s; }
  .music-wave span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
  .music-wave span:nth-child(3) { height: 70%; animation-delay: 0.3s; }
  .music-wave span:nth-child(4) { height: 90%; animation-delay: 0.45s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  .btn:not(.active) .music-wave { display: none; }
  .btn.active .music-icon-static { display: none; }

  /* ====== Responsive ====== */
  @media (max-width: 820px) {
    main { padding: 20px 16px; gap: 14px; }
    .app-header { gap: 14px; }
    .brand-text h1 { font-size: 24px; letter-spacing: 0.14em; }
    .brand-text p { font-size: 10px; letter-spacing: 0.25em; }
    .brand-seal { width: 46px; height: 46px; }
    .stats-bar { gap: 6px; width: 100%; justify-content: space-between; }
    .stat { padding: 8px 10px; min-width: 0; flex: 1; }
    .stat-value { font-size: 17px; }
    .stat-label { font-size: 9px; letter-spacing: 0.15em; }
    .controls { width: 100%; }
    .controls .btn { flex: 1; justify-content: center; padding: 10px 12px; font-size: 11px; }
    .turn-indicator { gap: 10px; }
    .player-pill { min-width: 0; flex: 1; padding: 8px 12px; gap: 8px; }
    .player-pill .pill-sigil { font-size: 24px; }
    .player-pill .pill-name { font-size: 11px; letter-spacing: 0.18em; }
    .player-pill .pill-score { font-size: 14px; }
    .turn-divider { min-width: 0; }
    .turn-divider .vs-mark { font-size: 14px; }
    .turn-divider .turn-text { font-size: 9px; letter-spacing: 0.15em; }
    .board { gap: 8px; }
    .difficulty-bar { gap: 6px; }
    .difficulty-label { display: none; }
    .difficulty-bar .btn { padding: 9px 12px; font-size: 11px; }
    .modal { padding: 36px 28px 30px; }
    .modal h2 { font-size: 26px; }
    .star { width: 52px; height: 52px; }
  }
  @media (max-width: 480px) {
    .stats-bar { gap: 4px; }
    .stat { padding: 6px 8px; }
    .stat-value { font-size: 15px; }
    .player-pill { flex-direction: column; gap: 4px; padding: 8px 6px; }

  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;

<script>
/* ============================================================
   ARCANUM — Duel of the Spheres
   A celestial tic-tac-toe game (دوز)
   ============================================================ */

const SOL = 'sol';
const LUNA = 'luna';
const SOL_SIGIL = '☉';
const LUNA_SIGIL = '☽';

const DIFFICULTIES = {
  apprentice: { size: 3, winLen: 3, maxWidth: 460, title: 'Apprentice Duel' },
  adept:      { size: 5, winLen: 4, maxWidth: 560, title: 'Adept Convergence' },
  master:     { size: 7, winLen: 5, maxWidth: 640, title: 'Master Conjunction' },
};

const STATE = {
  difficulty: 'apprentice',
  board: [],
  currentPlayer: SOL,
  gameMode: 'ai', // 'ai' or 'online'
  moveCount: 0,
  round: 1,
  solWins: 0,
  lunaWins: 0,
  draws: 0,
  locked: true,
  gameComplete: false,
  winningLine: null,
  winner: null,
  aiThinking: false,
  // Net state
  peer: null,
  conn: null,
  isHost: false,
  myRole: SOL, // SOL for host, LUNA for guest
  netConnected: false,
};

/* ============================================================
   AUDIO ENGINE — Web Audio API, fully synthesized
   ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.musicGain = null;
    this.sfxGain = null;
    this.musicPlaying = false;
    this.musicLayers = [];
    this.arpeggioTimeout = null;
    this.reverbNode = null;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.75;
    this.masterGain.connect(this.ctx.destination);

    this.reverbNode = this.ctx.createDelay(1.0);
    this.reverbNode.delayTime.value = 0.18;
    const feedback = this.ctx.createGain();
    feedback.gain.value = 0.32;
    const reverbWet = this.ctx.createGain();
    reverbWet.gain.value = 0.35;
    this.reverbNode.connect(feedback);
    feedback.connect(this.reverbNode);
    this.reverbNode.connect(reverbWet);
    reverbWet.connect(this.masterGain);

    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.42;
    this.musicGain.connect(this.masterGain);

    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 0.85;
    this.sfxGain.connect(this.masterGain);
    this.sfxGain.connect(this.reverbNode);
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  playPlace(player) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const baseFreq = player === SOL ? 523.25 : 392.00;
    const harmonics = player === SOL
      ? [
          { f: baseFreq,       type: 'sine',     g: 0.30, d: 1.2 },
          { f: baseFreq * 1.5, type: 'sine',     g: 0.16, d: 0.9 },
          { f: baseFreq * 2,   type: 'triangle', g: 0.10, d: 0.7 },
          { f: baseFreq * 3,   type: 'sine',     g: 0.05, d: 0.4 },
        ]
      : [
          { f: baseFreq,       type: 'triangle', g: 0.26, d: 1.4 },
          { f: baseFreq * 1.5, type: 'sine',     g: 0.14, d: 1.0 },
          { f: baseFreq * 2,   type: 'sine',     g: 0.08, d: 0.6 },
        ];
    harmonics.forEach(h => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = h.type;
      osc.frequency.value = h.f;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(h.g, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + h.d);
      osc.connect(gain).connect(this.sfxGain);
      osc.start(now);
      osc.stop(now + h.d + 0.05);
    });
  }

  playHover() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1320;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.025, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    osc.connect(gain).connect(this.sfxGain);
    osc.start(now);
    osc.stop(now + 0.1);
  }

  playWin(player) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const progression = player === SOL
      ? [ 
          { root: 261.63, third: 329.63, fifth: 392.0,  oct: 523.25 },
          { root: 392.0,  third: 493.88, fifth: 587.33, oct: 783.99 },
          { root: 220.0,  third: 261.63, fifth: 329.63, oct: 440.0  },
          { root: 349.23, third: 440.0,  fifth: 523.25, oct: 698.46 },
          { root: 523.25, third: 659.25, fifth: 783.99, oct: 1046.5 },
        ]
      : [ 
          { root: 220.0,  third: 261.63, fifth: 329.63, oct: 440.0  },
          { root: 174.61, third: 220.0,  fifth: 261.63, oct: 349.23 },
          { root: 261.63, third: 329.63, fifth: 392.0,  oct: 523.25 },
          { root: 196.0,  third: 246.94, fifth: 293.66, oct: 392.0  },
          { root: 220.0,  third: 261.63, fifth: 329.63, oct: 440.0  },
        ];
    progression.forEach((chord, idx) => {
      const start = now + idx * 0.32;
      [chord.root, chord.third, chord.fifth, chord.oct].forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = i === 0 ? 'sawtooth' : 'triangle';
        osc.frequency.value = freq;
        const peak = 0.12 / (i + 1);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(peak, start + 0.06);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 1.4);
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 2200;
        osc.connect(filter).connect(gain).connect(this.sfxGain);
        osc.start(start);
        osc.stop(start + 1.45);
      });
    });
  }

  playDraw() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const chord = [
      { f: 261.63, g: 0.16, d: 2.6 },
      { f: 329.63, g: 0.13, d: 2.6 },
      { f: 392.0,  g: 0.13, d: 2.6 },
      { f: 466.16, g: 0.09, d: 2.6 },
    ];
    chord.forEach(n => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = n.f;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(n.g, now + 0.5);
      gain.gain.linearRampToValueAtTime(n.g * 0.8, now + 1.9);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + n.d);
      osc.connect(gain).connect(this.sfxGain);
      osc.start(now);
      osc.stop(now + n.d + 0.1);
    });
  }

  startMusic() {
    if (!this.ctx || this.musicPlaying) return;
    this.musicPlaying = true;
    const ctx = this.ctx;

    const drone1 = ctx.createOscillator();
    const drone2 = ctx.createOscillator();
    const droneGain = ctx.createGain();
    drone1.type = 'sine'; drone1.frequency.value = 65.41;
    drone2.type = 'sine'; drone2.frequency.value = 98.0;
    droneGain.gain.value = 0.11;
    drone1.connect(droneGain); drone2.connect(droneGain);
    droneGain.connect(this.musicGain);
    drone1.start(); drone2.start();

    const pad = ctx.createOscillator();
    const padGain = ctx.createGain();
    const padFilter = ctx.createBiquadFilter();
    const padLfo = ctx.createOscillator();
    const padLfoGain = ctx.createGain();
    pad.type = 'sawtooth'; pad.frequency.value = 261.63;
    padFilter.type = 'lowpass'; padFilter.frequency.value = 600; padFilter.Q.value = 3;
    padGain.gain.value = 0.05;
    padLfo.frequency.value = 0.13;
    padLfoGain.gain.value = 4;
    padLfo.connect(padLfoGain).connect(pad.frequency);
    pad.connect(padFilter).connect(padGain).connect(this.musicGain);
    pad.start(); padLfo.start();

    const shimmer = ctx.createOscillator();
    const shimmerGain = ctx.createGain();
    const shimmerLfo = ctx.createOscillator();
    const shimmerLfoGain = ctx.createGain();
    shimmer.type = 'sine'; shimmer.frequency.value = 1046.5;
    shimmerGain.gain.value = 0.015;
    shimmerLfo.type = 'sine'; shimmerLfo.frequency.value = 0.27;
    shimmerLfoGain.gain.value = 0.012;
    shimmerLfo.connect(shimmerLfoGain).connect(shimmerGain.gain);
    shimmer.connect(shimmerGain).connect(this.musicGain);
    shimmer.start(); shimmerLfo.start();

    this.musicLayers = [drone1, drone2, pad, padLfo, shimmer, shimmerLfo];
    this._scheduleArpeggio();
  }

  _scheduleArpeggio() {
    if (!this.musicPlaying || !this.ctx) return;
    const notes = [523.25, 587.33, 659.25, 783.99, 880.0, 1046.5];
    const note = notes[Math.floor(Math.random() * notes.length)];
    const now = this.ctx.currentTime;

    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = note;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.045, now + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
    osc.connect(gain).connect(this.musicGain);
    osc.start(now);
    osc.stop(now + 2.85);

    this.arpeggioTimeout = setTimeout(() => this._scheduleArpeggio(), 2400 + Math.random() * 2800);
  }

  stopMusic() {
    if (!this.musicPlaying) return;
    this.musicPlaying = false;
    clearTimeout(this.arpeggioTimeout);
    this.musicLayers.forEach(osc => { try { osc.stop(); } catch(e){} });
    this.musicLayers = [];
  }
}
const audio = new AudioEngine();

/* ============================================================
   STARFIELD — twinkling background canvas
   ============================================================ */
function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.floor((w * h) / 7000);
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.4 + 0.3,
        baseAlpha: Math.random() * 0.5 + 0.25,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.6 + 0.2,
        hue: Math.random() < 0.15 ? 'gold' : (Math.random() < 0.1 ? 'jade' : 'cream'),
      });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  let t = 0;
  function animate() {
    ctx.clearRect(0, 0, w, h);
    t += 0.016;
    stars.forEach(s => {
      const alpha = Math.max(0, s.baseAlpha + Math.sin(t * s.speed + s.phase) * 0.4);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      let color;
      if (s.hue === 'gold') color = `rgba(244, 210, 122, ${alpha})`;
      else if (s.hue === 'jade') color = `rgba(111, 240, 176, ${alpha})`;
      else color = `rgba(245, 230, 211, ${alpha})`;
      ctx.fillStyle = color;
      ctx.fill();
      if (s.r > 1) {
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        let glowColor;
        if (s.hue === 'gold') glowColor = `rgba(232, 182, 90, ${alpha * 0.35})`;
        else if (s.hue === 'jade') glowColor = `rgba(61, 214, 140, ${alpha * 0.35})`;
        else glowColor = `rgba(245, 230, 211, ${alpha * 0.25})`;
        grad.addColorStop(0, glowColor);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    requestAnimationFrame(animate);
  }
  animate();
}

/* ============================================================
   GAME LOGIC
   ============================================================ */
function initRound() {
  const diff = DIFFICULTIES[STATE.difficulty];
  STATE.board = new Array(diff.size * diff.size).fill(null);
  STATE.currentPlayer = SOL;
  STATE.moveCount = 0;
  STATE.locked = true;
  STATE.gameComplete = false;
  STATE.winningLine = null;
  STATE.winner = null;
  STATE.aiThinking = false;

  renderBoard();
  updateUI();

  // Brief invocation delay before the duel begins
  setTimeout(() => { 
    // Don't unlock if it's online and not our turn
    if (STATE.gameMode === 'online' && STATE.myRole !== STATE.currentPlayer) {
      STATE.locked = true;
      return;
    }
    STATE.locked = false; 
  }, 700);
}

function renderBoard() {
  const board = document.getElementById('board');
  const diff = DIFFICULTIES[STATE.difficulty];
  board.style.gridTemplateColumns = `repeat(${diff.size}, minmax(0, 1fr))`;
  board.style.maxWidth = `${diff.maxWidth}px`;
  board.dataset.size = diff.size;

  const svg = document.getElementById('winLineOverlay');
  svg.innerHTML = '';
  board.innerHTML = '';
  board.appendChild(svg);

  for (let i = 0; i < STATE.board.length; i++) {
    const el = document.createElement('div');
    el.className = 'cell dealing';
    el.dataset.index = i;
    el.setAttribute('role', 'gridcell');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', `Cell ${i + 1}`);
    el.style.animationDelay = `${i * 0.03}s`;

    el.innerHTML = `<span class="symbol"></span>`;

    el.addEventListener('click', () => handleCellClick(i));
    el.addEventListener('mouseenter', () => handleCellHover(i, true));
    el.addEventListener('mouseleave', () => handleCellHover(i, false));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleCellClick(i);
      }
    });

    board.appendChild(el);
  }
}

function handleCellHover(idx, entering) {
  if (STATE.locked || STATE.gameComplete || STATE.aiThinking) return;
  if (STATE.board[idx] !== null) return;
  if (STATE.gameMode === 'ai' && STATE.currentPlayer === LUNA) return;
  if (STATE.gameMode === 'online' && STATE.myRole !== STATE.currentPlayer) return;

  const el = document.querySelector(`.cell[data-index="${idx}"]`);
  if (!el) return;
  const sym = el.querySelector('.symbol');

  if (entering) {
    sym.textContent = STATE.currentPlayer === SOL ? SOL_SIGIL : LUNA_SIGIL;
    el.classList.add(STATE.currentPlayer === SOL ? 'preview-sol' : 'preview-luna');
    audio.init();
    audio.playHover();
  } else {
    el.classList.remove('preview-sol', 'preview-luna');
    sym.textContent = '';
  }
}

function handleCellClick(idx) {
  audio.init();
  audio.resume();

  if (STATE.locked || STATE.gameComplete || STATE.aiThinking) return;
  if (STATE.board[idx] !== null) return;
  
  if (STATE.gameMode === 'ai' && STATE.currentPlayer === LUNA) return;
  if (STATE.gameMode === 'online') {
    if (STATE.myRole !== STATE.currentPlayer) return;
    // Send move to peer
    if (STATE.conn && STATE.conn.open) {
      STATE.conn.send({ type: 'move', index: idx, player: STATE.myRole });
    } else {
      console.log("Connection lost");
      return;
    }
  }

  if (!audio.musicPlaying && !window._userDisabledMusic) {
    audio.startMusic();
    document.getElementById('musicToggle').classList.add('active');
    document.getElementById('musicLabel').textContent = 'Playing';
  }

  placePiece(idx, STATE.currentPlayer);
}

function placePiece(idx, player) {
  STATE.board[idx] = player;
  STATE.moveCount++;

  const el = document.querySelector(`.cell[data-index="${idx}"]`);
  if (el) {
    el.classList.remove('preview-sol', 'preview-luna');
    el.classList.add('placed', player);
    const sym = el.querySelector('.symbol');
    sym.textContent = player === SOL ? SOL_SIGIL : LUNA_SIGIL;
  }

  audio.playPlace(player);
  if (el) burstParticles(el, player);

  const diff = DIFFICULTIES[STATE.difficulty];
  const result = checkWin(STATE.board, diff.size, diff.winLen);
  if (result) {
    STATE.winningLine = result.line;
    STATE.winner = result.winner;
    STATE.gameComplete = true;
    STATE.locked = true;
    highlightWinningLine(result.line, result.winner);
    setTimeout(() => completeRound(result.winner), 1100);
    return;
  }
  if (STATE.board.every(c => c !== null)) {
    STATE.gameComplete = true;
    STATE.locked = true;
    setTimeout(() => completeRound(null), 500);
    return;
  }

  STATE.currentPlayer = player === SOL ? LUNA : SOL;
  updateUI();

  // Handle locking and unlocking based on game state
  if (STATE.gameMode === 'online') {
    if (STATE.myRole !== STATE.currentPlayer) {
      STATE.locked = true;
    } else {
      STATE.locked = false;
    }
  } else {
    // In local vs AI mode, unlock for user (SOL)
    STATE.locked = false;
  }

  // AI move with deep thinking
  if (STATE.gameMode === 'ai' && STATE.currentPlayer === LUNA && !STATE.gameComplete) {
    STATE.aiThinking = true;
    STATE.locked = true;
    updateUI();
    
    setTimeout(() => {
      const move = getAiMove();
      STATE.aiThinking = false;
      if (move !== -1 && !STATE.gameComplete) {
        placePiece(move, LUNA);
      }
    }, 500 + Math.random() * 300);
  }
}

/* ============================================================
   WIN DETECTION
   ============================================================ */
function checkWin(board, size, winLen) {
  const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const start = board[r * size + c];
      if (!start) continue;
      for (const [dr, dc] of dirs) {
        const line = [r * size + c];
        let valid = true;
        for (let k = 1; k < winLen; k++) {
          const nr = r + dr * k;
          const nc = c + dc * k;
          if (nr < 0 || nr >= size || nc < 0 || nc >= size) { valid = false; break; }
          if (board[nr * size + nc] !== start) { valid = false; break; }
          line.push(nr * size + nc);
        }
        if (valid) return { winner: start, line };
      }
    }
  }
  return null;
}

function highlightWinningLine(line, winner) {
  line.forEach(idx => {
    const el = document.querySelector(`.cell[data-index="${idx}"]`);
    if (el) el.classList.add('winning', winner);
  });
  drawWinLine(line, winner);
}

function drawWinLine(line, winner) {
  const svg = document.getElementById('winLineOverlay');
  svg.innerHTML = '';

  const board = document.getElementById('board');
  const boardRect = board.getBoundingClientRect();

  const firstCell = document.querySelector(`.cell[data-index="${line[0]}"]`);
  const lastCell = document.querySelector(`.cell[data-index="${line[line.length - 1]}"]`);
  if (!firstCell || !lastCell) return;

  const fr = firstCell.getBoundingClientRect();
  const lr = lastCell.getBoundingClientRect();

  const x1 = (fr.left + fr.width / 2 - boardRect.left) / boardRect.width * 100;
  const y1 = (fr.top + fr.height / 2 - boardRect.top) / boardRect.height * 100;
  const x2 = (lr.left + lr.width / 2 - boardRect.left) / boardRect.width * 100;
  const y2 = (lr.top + lr.height / 2 - boardRect.top) / boardRect.height * 100;

  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const ext = 4;
  const ex1 = x1 - (dx / len) * ext;
  const ey1 = y1 - (dy / len) * ext;
  const ex2 = x2 + (dx / len) * ext;
  const ey2 = y2 + (dy / len) * ext;

  const color = winner === SOL ? '#f4d27a' : '#6ff0b0';

  const glow = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  glow.setAttribute('x1', ex1);
  glow.setAttribute('y1', ey1);
  glow.setAttribute('x2', ex2);
  glow.setAttribute('y2', ey2);
  glow.setAttribute('stroke', color);
  glow.setAttribute('stroke-width', '4');
  glow.setAttribute('stroke-linecap', 'round');
  glow.setAttribute('opacity', '0.3');
  glow.style.filter = `blur(4px)`;
  glow.classList.add('win-line');
  svg.appendChild(glow);

  const mainLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  mainLine.setAttribute('x1', ex1);
  mainLine.setAttribute('y1', ey1);
  mainLine.setAttribute('x2', ex2);
  mainLine.setAttribute('y2', ey2);
  mainLine.setAttribute('stroke', color);
  mainLine.setAttribute('stroke-width', '1.4');
  mainLine.setAttribute('stroke-linecap', 'round');
  mainLine.style.filter = `drop-shadow(0 0 3px ${color})`;
  mainLine.classList.add('win-line');
  svg.appendChild(mainLine);
}

/* ============================================================
   AI ENGINE
   ============================================================ */
function getValidMoves(board, size) {
  const moves = new Set();
  const range = 2;
  let hasAnyPiece = false;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r * size + c] !== null) {
        hasAnyPiece = true;
        for (let dr = -range; dr <= range; dr++) {
          for (let dc = -range; dc <= range; dc++) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
              const idx = nr * size + nc;
              if (board[idx] === null) moves.add(idx);
            }
          }
        }
      }
    }
  }
  
  if (!hasAnyPiece) return [Math.floor(size * size / 2)];
  return Array.from(moves);
}

function findImmediateWin(board, size, winLen, player) {
  const moves = getValidMoves(board, size);
  for (const move of moves) {
    board[move] = player;
    const win = checkWin(board, size, winLen);
    board[move] = null;
    if (win && win.winner === player) return move;
  }
  return -1;
}

function evaluateWindow(window, winLen, player, opponent) {
  let score = 0;
  const pCount = window.filter(c => c === player).length;
  const oCount = window.filter(c => c === opponent).length;
  const eCount = window.filter(c => c === null).length;

  if (pCount > 0 && oCount > 0) return 0;

  if (pCount === winLen) score += 1000000;
  else if (pCount === winLen - 1) score += 10000;
  else if (pCount === winLen - 2) score += 1000;
  else if (pCount === winLen - 3) score += 100;
  else if (pCount === 1) score += 1;

  if (oCount === winLen) score -= 1000000;
  else if (oCount === winLen - 1) score -= 8000; 
  else if (oCount === winLen - 2) score -= 800;
  else if (oCount === winLen - 3) score -= 80;
  else if (oCount === 1) score -= 1;

  return score;
}

function evaluateBoard(board, size, winLen, player, opponent) {
  let score = 0;
  const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
  
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      for (const [dr, dc] of dirs) {
        const window = [];
        let valid = true;
        for (let k = 0; k < winLen; k++) {
          const nr = r + dr * k;
          const nc = c + dc * k;
          if (nr < 0 || nr >= size || nc < 0 || nc >= size) { valid = false; break; }
          window.push(board[nr * size + nc]);
        }
        if (valid) {
          score += evaluateWindow(window, winLen, player, opponent);
        }
      }
    }
  }

  const center = Math.floor(size / 2);
  const centerIndex = center * size + center;
  if (board[centerIndex] === player) score += 15;
  if (board[centerIndex] === opponent) score -= 15;

  return score;
}

function minimax(board, size, winLen, currentPlayer, depth, maxDepth, alpha, beta) {
  const win = checkWin(board, size, winLen);
  if (win) {
    if (win.winner === LUNA) return { score: 1000000 - depth, move: -1 };
    if (win.winner === SOL) return { score: -1000000 + depth, move: -1 };
  }
  
  if (depth === maxDepth) {
    return { score: evaluateBoard(board, size, winLen, LUNA, SOL), move: -1 };
  }

  const isMaximizing = currentPlayer === LUNA;
  let bestScore = isMaximizing ? -Infinity : Infinity;
  let bestMove = -1;

  let moves = getValidMoves(board, size);
  if (moves.length === 0) return { score: 0, move: -1 };

  moves.sort((a, b) => {
    board[a] = LUNA; const sa = evaluateBoard(board, size, winLen, LUNA, SOL); board[a] = null;
    board[b] = LUNA; const sb = evaluateBoard(board, size, winLen, LUNA, SOL); board[b] = null;
    return sb - sa;
  });

  if (moves.length > 12) moves = moves.slice(0, 12);

  for (const i of moves) {
    board[i] = currentPlayer;
    const nextPlayer = currentPlayer === LUNA ? SOL : LUNA;
    const result = minimax(board, size, winLen, nextPlayer, depth + 1, maxDepth, alpha, beta);
    board[i] = null;

    if (isMaximizing) {
      if (result.score > bestScore) {
        bestScore = result.score;
        bestMove = i;
      }
      alpha = Math.max(alpha, bestScore);
    } else {
      if (result.score < bestScore) {
        bestScore = result.score;
        bestMove = i;
      }
      beta = Math.min(beta, bestScore);
    }
    if (beta <= alpha) break;
  }
  
  return { score: bestScore, move: bestMove };
}

function getAiMove() {
  const diff = DIFFICULTIES[STATE.difficulty];
  const size = diff.size;
  const winLen = diff.winLen;
  const board = [...STATE.board];

  let move = findImmediateWin(board, size, winLen, LUNA);
  if (move !== -1) return move;

  move = findImmediateWin(board, size, winLen, SOL);
  if (move !== -1) return move;

  let maxDepth = 4;
  if (size === 3) maxDepth = 9;
  if (size === 5) maxDepth = 3;
  if (size === 7) maxDepth = 2;

  const result = minimax(board, size, winLen, LUNA, 0, maxDepth, -Infinity, Infinity);
  return result.move !== -1 ? result.move : getValidMoves(board, size)[0];
}


/* ============================================================
   ONLINE MULTIPLAYER — AUTOMATIC MATCHMAKING
   ============================================================ */
let matchmakingIndex = 0;
let currentTempPeer = null;
let currentTempConn = null;
let connectionTimeout = null;

function hideNetModal() {
  document.getElementById('netModalOverlay').classList.remove('active');
}

function startMatchmaking() {
  audio.init();
  audio.resume();

  // فعال کردن نشانگرهای ظاهری دکمه‌ها
  document.getElementById('modeFriend').classList.add('active', 'jade-active');
  document.getElementById('modeAi').classList.remove('active');

  // نمایش مدال لابی و مقداردهی اولیه متن‌ها
  document.getElementById('netModalOverlay').classList.add('active');
  document.getElementById('netLobbyTitle').textContent = 'Searching the Void';
  document.getElementById('netLobbySubtitle').textContent = 'Scanning for other active duelists...';
  document.getElementById('netLobbyStatus').textContent = 'Initial alignment...';

  STATE.gameMode = 'online';
  matchmakingIndex = 0;
  resetMatchmakingState();
  trySlot(0);
}

function resetMatchmakingState() {
  if (connectionTimeout) clearTimeout(connectionTimeout);
  if (currentTempPeer) {
    try { currentTempPeer.destroy(); } catch(e){}
    currentTempPeer = null;
  }
  if (currentTempConn) {
    try { currentTempConn.close(); } catch(e){}
    currentTempConn = null;
  }
  if (STATE.peer) {
    try { STATE.peer.destroy(); } catch(e){}
    STATE.peer = null;
  }
  if (STATE.conn) {
    try { STATE.conn.close(); } catch(e){}
    STATE.conn = null;
  }
  STATE.netConnected = false;
}

function trySlot(index) {
  if (STATE.gameMode !== 'online') return;
  if (index > 25) {
    document.getElementById('netLobbyStatus').textContent = 'Void is deep. Retrying search...';
    index = 0;
  }

  matchmakingIndex = index;
  document.getElementById('netLobbyStatus').textContent = `Scanning slot ${index + 1}...`;

  if (connectionTimeout) clearTimeout(connectionTimeout);
  if (currentTempPeer) {
    try { currentTempPeer.destroy(); } catch(e){}
    currentTempPeer = null;
  }
  if (currentTempConn) {
    try { currentTempConn.close(); } catch(e){}
    currentTempConn = null;
  }

  let handled = false;
  // شناسه مشترک لابی بر اساس آدرس وب
  const slotId = `arcanum-duel-lobby-v3-${index}`;
  const peer = new Peer(slotId);
  currentTempPeer = peer;

  peer.on('open', () => {
    if (handled) return;
    handled = true;

    // ثبت به عنوان Host این اسلات
    STATE.isHost = true;
    STATE.myRole = SOL;
    STATE.peer = peer;

    document.getElementById('netLobbyStatus').textContent = `Offering sanctuary on slot ${index + 1}...`;

    peer.on('connection', (conn) => {
      if (STATE.netConnected) {
        conn.on('open', () => {
          conn.send({ type: 'lobby-busy' });
          setTimeout(() => conn.close(), 500);
        });
        return;
      }
      STATE.conn = conn;
      setupHostConnection();
    });
  });

  peer.on('error', (err) => {
    if (handled) return;
    handled = true;

    if (err.type === 'unavailable-id') {
      // اسلات پر است. تلاش برای ورود به عنوان مهمان
      peer.destroy();
      currentTempPeer = null;
      tryConnectAsGuest(index);
    } else {
      // بروز خطای دیگر، بررسی اسلات بعدی
      peer.destroy();
      currentTempPeer = null;
      setTimeout(() => trySlot(index + 1), 300);
    }
  });
}

function tryConnectAsGuest(index) {
  document.getElementById('netLobbyStatus').textContent = `Connecting to candidate on slot ${index + 1}...`;

  const guestPeer = new Peer();
  currentTempPeer = guestPeer;
  let guestHandled = false;

  guestPeer.on('open', () => {
    const slotId = `arcanum-duel-lobby-v3-${index}`;
    const conn = guestPeer.connect(slotId, { reliable: true });
    currentTempConn = conn;

    // محافظت از انتظار طولانی در صورت قطع بودن کاندید
    connectionTimeout = setTimeout(() => {
      if (guestHandled) return;
      guestHandled = true;
      cleanupAndNextSlot(guestPeer, conn, index);
    }, 3500);

    conn.on('open', () => {
      if (guestHandled) return;
      guestHandled = true;
      conn.send({ type: 'join-lobby' });
    });

    conn.on('data', (data) => {
      if (guestHandled) return;

      if (data.type === 'lobby-accepted') {
        guestHandled = true;
        clearTimeout(connectionTimeout);

        // هماهنگی موفقیت‌آمیز
        STATE.peer = guestPeer;
        STATE.conn = conn;
        STATE.netConnected = true;
        STATE.isHost = false;
        STATE.myRole = LUNA;

        document.getElementById('netLobbyStatus').textContent = 'Celestial link forged!';
        setTimeout(() => {
          hideNetModal();
          setupCommonConnectionEvents();
          initRound();
        }, 600);

      } else if (data.type === 'lobby-busy') {
        guestHandled = true;
        clearTimeout(connectionTimeout);
        cleanupAndNextSlot(guestPeer, conn, index);
      }
    });

    conn.on('close', () => {
      if (guestHandled) return;
      guestHandled = true;
      clearTimeout(connectionTimeout);
      cleanupAndNextSlot(guestPeer, conn, index);
    });
  });

  guestPeer.on('error', (err) => {
    if (guestHandled) return;
    guestHandled = true;
    clearTimeout(connectionTimeout);
    cleanupAndNextSlot(guestPeer, null, index);
  });
}

function cleanupAndNextSlot(peer, conn, index) {
  if (conn) { try { conn.close(); } catch(e){} }
  if (peer) { try { peer.destroy(); } catch(e){} }
  setTimeout(() => trySlot(index + 1), 200);
}

function setupHostConnection() {
  const conn = STATE.conn;
  conn.on('data', (data) => {
    if (data.type === 'join-lobby') {
      if (STATE.netConnected) {
        conn.send({ type: 'lobby-busy' });
        setTimeout(() => conn.close(), 500);
        return;
      }

      STATE.netConnected = true;
      conn.send({ type: 'lobby-accepted' });

      document.getElementById('netLobbyStatus').textContent = 'Celestial link forged!';
      setTimeout(() => {
        hideNetModal();
        setupCommonConnectionEvents();
        initRound();
      }, 600);
    }
  });

  conn.on('close', () => {
    handleOpponentDisconnect();
  });
}

function setupCommonConnectionEvents() {
  const conn = STATE.conn;
  conn.on('data', (data) => {
    handleNetData(data);
  });

  conn.on('close', () => {
    handleOpponentDisconnect();
  });
}

function handleOpponentDisconnect() {
  STATE.netConnected = false;
  alert("The connection was severed by the void. Returning to singleplayer.");
  STATE.gameMode = 'ai';
  document.getElementById('modeAi').classList.add('active');
  document.getElementById('modeFriend').classList.remove('active', 'jade-active');
  initRound();
}

function cancelMatchmaking() {
  resetMatchmakingState();
  hideNetModal();
  STATE.gameMode = 'ai';
  document.getElementById('modeAi').classList.add('active');
  document.getElementById('modeFriend').classList.remove('active', 'jade-active');
  initRound();
}

function handleNetData(data) {
  if (data.type === 'move') {
    const opponentRole = STATE.myRole === SOL ? LUNA : SOL;
    if (STATE.currentPlayer === opponentRole) {
      placePiece(data.index, opponentRole);
    }
  } else if (data.type === 'reset') {
    STATE.round++;
    initRound();
  } else if (data.type === 'difficulty') {
    STATE.difficulty = data.diff;
    document.querySelectorAll('[data-diff]').forEach(b => {
      b.classList.toggle('active', b.dataset.diff === data.diff);
    });
  }
}

/* ============================================================
   UI UPDATES
   ============================================================ */
function updateUI() {
  document.getElementById('solWinsVal').textContent = STATE.solWins;
  document.getElementById('lunaWinsVal').textContent = STATE.lunaWins;
  document.getElementById('drawsVal').textContent = STATE.draws;
  document.getElementById('roundVal').textContent = STATE.round;

  document.getElementById('solPillScore').textContent = STATE.solWins;
  document.getElementById('lunaPillScore').textContent = STATE.lunaWins;

  const solPill = document.getElementById('solPill');
  const lunaPill = document.getElementById('lunaPill');
  const turnText = document.getElementById('turnText');

  if (STATE.gameComplete) {
    solPill.classList.remove('active');
    lunaPill.classList.remove('active');
    turnText.textContent = STATE.winner ? `${STATE.winner === SOL ? 'Sol' : 'Luna'} Triumphant` : 'Equilibrium';
    turnText.classList.toggle('luna-turn', STATE.winner === LUNA);
  } else if (STATE.aiThinking) {
    solPill.classList.remove('active');
    lunaPill.classList.add('active');
    turnText.textContent = 'Luna Contemplates';
    turnText.classList.add('luna-turn');
  } else if (STATE.currentPlayer === SOL) {
    solPill.classList.add('active');
    lunaPill.classList.remove('active');
    
    if (STATE.gameMode === 'online') {
      turnText.textContent = STATE.myRole === SOL ? "Your Invocation" : "Sol's Invocation";
    } else {
      turnText.textContent = "Sol's Invocation";
    }
    turnText.classList.remove('luna-turn');
  } else {
    solPill.classList.remove('active');
    lunaPill.classList.add('active');
    
    if (STATE.gameMode === 'online') {
      turnText.textContent = STATE.myRole === LUNA ? "Your Invocation" : "Luna's Invocation";
    } else {
      turnText.textContent = "Luna's Invocation";
    }
    turnText.classList.add('luna-turn');
  }
}

/* ============================================================
   VISUAL EFFECTS
   ============================================================ */
function burstParticles(cellEl, player) {
  const rect = cellEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 14;
  const baseHue = player === SOL ? 42 : 145;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.left = `${cx - size/2}px`;
    p.style.top = `${cy - size/2}px`;
    const hue = baseHue + (Math.random() - 0.5) * 20;
    const sat = 85;
    const light = 60 + Math.random() * 15;
    p.style.background = `hsl(${hue}, ${sat}%, ${light}%)`;
    p.style.boxShadow = `0 0 12px hsl(${hue}, ${sat}%, ${light}%)`;
    document.body.appendChild(p);

    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
    const speed = 50 + Math.random() * 80;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed - 30;

    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)', opacity: 0 }
    ], { duration: 800 + Math.random() * 300, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' })
    .onfinish = () => p.remove();
  }
}

function celebrationBurst(player) {
  const board = document.getElementById('board');
  const rect = board.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 36;
  const baseHue = player === SOL ? 42 : 145;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.left = `${cx - size/2}px`;
    p.style.top = `${cy - size/2}px`;
    const hue = baseHue + (Math.random() - 0.5) * 40;
    const light = 60 + Math.random() * 20;
    p.style.background = `hsl(${hue}, 90%, ${light}%)`;
    p.style.boxShadow = `0 0 16px hsl(${hue}, 90%, ${light}%)`;
    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 180;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed - 50;

    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)', opacity: 0 }
    ], { duration: 1200 + Math.random() * 500, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' })
    .onfinish = () => p.remove();

}

/* ============================================================
   ROUND COMPLETION
   ============================================================ */
function completeRound(winner) {
  const modal = document.getElementById('modal');
  const modalRune = document.getElementById('modalRune');

  modal.classList.remove('luna-win', 'draw-modal');

  if (winner === SOL) {
    STATE.solWins++;
    audio.playWin(SOL);
    document.getElementById('modalTitle').textContent = 'Sol Triumphant';
    document.getElementById('modalSubtitle').textContent = 'The sun claims the cosmos';
    modalRune.innerHTML = `
      <circle cx="28" cy="28" r="24" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
      <circle cx="28" cy="28" r="12" fill="url(#goldGrad)" opacity="0.4"/>
      <circle cx="28" cy="28" r="7" fill="url(#goldGrad)"/>
      <g stroke="url(#goldGrad)" stroke-width="1.4" stroke-linecap="round">
        <line x1="28" y1="6" x2="28" y2="12"/>
        <line x1="28" y1="44" x2="28" y2="50"/>
        <line x1="6" y1="28" x2="12" y2="28"/>
        <line x1="44" y1="28" x2="50" y2="28"/>
        <line x1="12" y1="12" x2="16" y2="16"/>
        <line x1="40" y1="40" x2="44" y2="44"/>
        <line x1="44" y1="12" x2="40" y2="16"/>
        <line x1="12" y1="44" x2="16" y2="40"/>
      </g>
    `;
    celebrationBurst(SOL);
  } else if (winner === LUNA) {
    STATE.lunaWins++;
    audio.playWin(LUNA);
    modal.classList.add('luna-win');
    document.getElementById('modalTitle').textContent = 'Luna Ascendant';
    document.getElementById('modalSubtitle').textContent = 'The moon weaves its veil';
    modalRune.innerHTML = `
      <circle cx="28" cy="28" r="24" fill="none" stroke="url(#jadeGrad)" stroke-width="1"/>
      <path d="M 36 14 A 14 14 0 1 0 36 42 A 11 11 0 1 1 36 14 Z" fill="url(#jadeGrad)" opacity="0.85"/>
      <circle cx="22" cy="20" r="1.5" fill="url(#jadeGrad)" opacity="0.6"/>
      <circle cx="18" cy="32" r="1" fill="url(#jadeGrad)" opacity="0.5"/>
    `;
    celebrationBurst(LUNA);
  } else {
    STATE.draws++;
    audio.playDraw();
    modal.classList.add('draw-modal');
    document.getElementById('modalTitle').textContent = 'Cosmic Equilibrium';
    document.getElementById('modalSubtitle').textContent = 'Two spheres in perfect balance';
    modalRune.innerHTML = `
      <circle cx="28" cy="28" r="24" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
      <path d="M 28 4 A 12 12 0 1 0 28 52 A 12 12 0 1 0 28 4 Z" fill="url(#goldGrad)" opacity="0.3"
            clip-path="polygon(0 0, 50% 0, 50% 100%, 0 100%)"/>
      <path d="M 28 4 A 12 12 0 1 1 28 52 A 12 12 0 1 1 28 4 Z" fill="url(#jadeGrad)" opacity="0.3"/>
      <line x1="28" y1="4" x2="28" y2="52" stroke="url(#goldGrad)" stroke-width="1"/>
    `;
  }

  updateUI();

  let stars = 0;
  if (winner === SOL) stars = 3;
  else if (winner === LUNA) stars = STATE.gameMode === 'ai' ? 1 : 3;
  else stars = 2;

  const starsContainer = document.getElementById('starsContainer');
  starsContainer.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const isJade = winner === LUNA;
    star.innerHTML = `
      <svg viewBox="0 0 60 60" width="64" height="64">
        <defs>
          <linearGradient id="starGrad${i}" x1="0" y1="0" x2="0" y2="1">
            ${isJade
              ? '<stop offset="0" stop-color="#b8f5d4"/><stop offset="0.5" stop-color="#6ff0b0"/><stop offset="1" stop-color="#1a8a55"/>'
              : '<stop offset="0" stop-color="#fff5d6"/><stop offset="0.5" stop-color="#f4d27a"/><stop offset="1" stop-color="#a87a30"/>'}
          </linearGradient>
        </defs>
        <path d="M30 4 L37 22 L56 22 L41 33 L47 52 L30 41 L13 52 L19 33 L4 22 L23 22 Z"
              fill="url(#starGrad${i})"
              stroke="${isJade ? '#b8f5d4' : '#fff5d6'}"
              stroke-width="1.2"/>
      </svg>
    `;
    starsContainer.appendChild(star);
    setTimeout(() => {
      if (i < stars) {
        star.classList.add('lit');
        if (isJade) star.classList.add('jade');
        addStarSparkles(star, isJade);
      }
    }, 700 + i * 320);
  }

  document.getElementById('finalMoves').textContent = STATE.moveCount;
  document.getElementById('finalRound').textContent = STATE.round;
  document.getElementById('finalScore').textContent = `${STATE.solWins} — ${STATE.lunaWins}`;

  setTimeout(() => {
    document.getElementById('modalOverlay').classList.add('active');
    if (winner) startConfetti(winner);
  }, 900);
}

function addStarSparkles(starEl, isJade) {
  const rect = starEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 3;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${cx - size/2}px`;
      p.style.top = `${cy - size/2}px`;
      p.style.background = isJade ? '#b8f5d4' : '#fff5d6';
      p.style.boxShadow = isJade ? '0 0 10px #6ff0b0' : '0 0 10px #f4d27a';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 50;
      p.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)', opacity: 0 }
      ], { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
    }, i * 60);
  }
}

/* ============================================================
   CONFETTI
   ============================================================ */
let confettiActive = false;
let confettiParticles = [];

function startConfetti(winner) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  confettiActive = true;
  confettiParticles = [];

  const baseColors = winner === SOL
    ? ['#f4d27a','#e8b65a','#fff5d6','#ff9a8b','#f5e6d3']
    : ['#6ff0b0','#3dd68c','#b8f5d4','#fff5d6','#f5e6d3'];

  for (let i = 0; i < 200; i++) {
    confettiParticles.push(makeConfetti(
      window.innerWidth / 2 + (Math.random() - 0.5) * 240,
      -20,
      (Math.random() - 0.5) * 10,
      Math.random() * 4 + 2,
      baseColors
    ));
  }
  setTimeout(() => {
    if (!confettiActive) return;
    for (let i = 0; i < 70; i++) {
      confettiParticles.push(makeConfetti(0, window.innerHeight * 0.45, Math.random() * 8 + 3, -(Math.random() * 9 + 3), baseColors));
      confettiParticles.push(makeConfetti(window.innerWidth, window.innerHeight * 0.45, -(Math.random() * 8 + 3), -(Math.random() * 9 + 3), baseColors));
    }
  }, 450);

  let rainCount = 0;
  const rainInterval = setInterval(() => {
    if (!confettiActive || rainCount > 25) { clearInterval(rainInterval); return; }
    for (let i = 0; i < 10; i++) {
      confettiParticles.push(makeConfetti(
        Math.random() * window.innerWidth, -20,
        (Math.random() - 0.5) * 4, Math.random() * 2 + 1, baseColors
      ));
    }
    rainCount++;
  }, 400);

  animateConfetti();
}

function makeConfetti(x, y, vx, vy, colors) {
  return {
    x, y, vx, vy,
    gravity: 0.18,
    friction: 0.99,
    size: Math.random() * 8 + 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    rotation: Math.random() * Math.PI * 2,
    rotationSpeed: (Math.random() - 0.5) * 0.35,
    shape: Math.random() < 0.4 ? 'rect' : (Math.random() < 0.7 ? 'circle' : 'star'),
    life: 1,
    flutter: Math.random() * Math.PI * 2,
    flutterSpeed: 0.05 + Math.random() * 0.05,
  };
}

function drawConfettiShape(ctx, p) {
  ctx.fillStyle = p.color;
  if (p.shape === 'rect') {
    ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
  } else if (p.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    const r1 = p.size / 2;
    const r2 = r1 * 0.45;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? r1 : r2;
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function animateConfetti() {
  if (!confettiActive) return;
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confettiParticles = confettiParticles.filter(p => {
    p.vy += p.gravity;
    p.vx *= p.friction;
    p.flutter += p.flutterSpeed;
    p.x += p.vx + Math.sin(p.flutter) * 0.8;
    p.y += p.vy;
    p.rotation += p.rotationSpeed;
    p.life -= 0.004;

    if (p.y > canvas.height + 60 || p.life <= 0) return false;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    drawConfettiShape(ctx, p);
    ctx.restore();
    return true;
  });

  if (confettiParticles.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiActive = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
document.getElementById('musicToggle').addEventListener('click', (e) => {
  audio.init();
  audio.resume();
  const btn = e.currentTarget;
  const label = document.getElementById('musicLabel');
  if (audio.musicPlaying) {
    audio.stopMusic();
    btn.classList.remove('active');
    label.textContent = 'Music';
    window._userDisabledMusic = true;
  } else {
    audio.startMusic();
    btn.classList.add('active');
    label.textContent = 'Playing';
    window._userDisabledMusic = false;
  }
});

// Mode toggles
document.getElementById('modeAi').addEventListener('click', () => {
  if (STATE.gameMode === 'ai') return;
  
  resetMatchmakingState();

  STATE.gameMode = 'ai';
  document.getElementById('modeAi').classList.add('active');
  document.getElementById('modeFriend').classList.remove('active', 'jade-active');
  
  STATE.round = 1;
  STATE.solWins = 0;
  STATE.lunaWins = 0;
  STATE.draws = 0;
  initRound();
});

document.getElementById('modeFriend').addEventListener('click', () => {
  if (STATE.gameMode === 'online' && STATE.netConnected) return;
  startMatchmaking();
});

document.getElementById('cancelMatchmakingBtn').addEventListener('click', () => {
  cancelMatchmaking();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
  confettiActive = false;
  STATE.round++;
  
  // Sync reset in online mode
  if (STATE.gameMode === 'online' && STATE.conn && STATE.conn.open) {
    STATE.conn.send({ type: 'reset' });
  }
  initRound();
});

document.getElementById('playAgainBtn').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
  confettiActive = false;
  STATE.round++;
  
  // Sync reset in online mode
  if (STATE.gameMode === 'online' && STATE.conn && STATE.conn.open) {
    STATE.conn.send({ type: 'reset' });
  }
  setTimeout(() => initRound(), 300);
});

document.querySelectorAll('[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    STATE.difficulty = btn.dataset.diff;
    
    // Sync difficulty in online mode
    if (STATE.gameMode === 'online' && STATE.conn && STATE.conn.open) {
      STATE.conn.send({ type: 'difficulty', diff: STATE.difficulty });
    }
    
    document.getElementById('modalOverlay').classList.remove('active');
    confettiActive = false;
    STATE.round = 1;
    STATE.solWins = 0;
    STATE.lunaWins = 0;
    STATE.draws = 0;
    initRound();
  });
});

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (STATE.winningLine) {
    drawWinLine(STATE.winningLine, STATE.winner);
  }
});

/* ============================================================
   INITIALIZE
   ============================================================ */
initStarfield();
initRound();
</script>
